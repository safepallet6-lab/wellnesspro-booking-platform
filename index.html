<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WellnessPro - Booking Platform</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0fdfa; color: #0f172a; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* Auth */
        .auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .auth-box h1 { text-align: center; color: #0d9488; margin-bottom: 10px; }
        .auth-box p { text-align: center; color: #64748b; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 16px; }
        .form-group input:focus { outline: none; border-color: #0d9488; }
        .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #0d9488, #0f766e); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(13,148,136,0.3); }
        
        /* Dashboard */
        .dashboard { display: none; min-height: 100vh; }
        .sidebar { width: 260px; background: white; position: fixed; height: 100vh; border-right: 1px solid #e2e8f0; padding: 20px; }
        .logo { font-size: 24px; font-weight: 800; color: #0d9488; margin-bottom: 30px; }
        .nav-item { padding: 12px 16px; border-radius: 10px; cursor: pointer; margin-bottom: 5px; color: #64748b; }
        .nav-item:hover, .nav-item.active { background: #f0fdfa; color: #0d9488; }
        .main-content { margin-left: 260px; padding: 30px; }
        
        /* Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 24px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .stat-card h3 { font-size: 32px; color: #0d9488; margin-bottom: 5px; }
        .stat-card p { color: #64748b; }
        
        .card { background: white; border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card h2 { margin-bottom: 20px; font-size: 20px; }
        
        /* Providers */
        .providers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .provider-card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .provider-header { height: 100px; background: linear-gradient(135deg, #0d9488, #14b8a6); position: relative; }
        .provider-avatar { width: 80px; height: 80px; background: white; border-radius: 50%; position: absolute; bottom: -40px; left: 20px; display: flex; align-items: center; justify-content: center; font-size: 32px; border: 4px solid white; }
        .provider-content { padding: 50px 20px 20px; }
        .provider-content h3 { margin-bottom: 5px; }
        .provider-content p { color: #64748b; margin-bottom: 15px; }
        .price { font-size: 24px; font-weight: 700; color: #0d9488; margin-bottom: 15px; }
        .btn-small { padding: 10px 20px; background: #0d9488; color: white; border: none; border-radius: 8px; cursor: pointer; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #e2e8f0; }
        th { color: #64748b; font-weight: 600; }
        .status { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .status.confirmed { background: #dcfce7; color: #166534; }
        .status.pending { background: #fef3c7; color: #92400e; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- Auth View -->
    <div class="auth-container" id="authView">
        <div class="auth-box">
            <h1>WellnessPro</h1>
            <p>Professional booking platform</p>
            <form onsubmit="login(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label>Login as</label>
                    <select id="role">
                        <option value="client">Client</option>
                        <option value="provider">Provider</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <button type="submit" class="btn">Sign In</button>
            </form>
        </div>
    </div>

    <!-- Dashboard View -->
    <div class="dashboard" id="dashboardView">
        <div class="sidebar">
            <div class="logo">WellnessPro</div>
            <div class="nav-item active" onclick="showPage('home')">Dashboard</div>
            <div class="nav-item" onclick="showPage('providers')">Find Providers</div>
            <div class="nav-item" onclick="showPage('bookings')">My Bookings</div>
            <div class="nav-item" onclick="logout()">Logout</div>
        </div>
        
        <div class="main-content" id="mainContent">
            <!-- Content loaded by JS -->
        </div>
    </div>

    <script>
        let currentUser = null;
        
        function login(e) {
            e.preventDefault();
            currentUser = {
                email: document.getElementById('email').value,
                role: document.getElementById('role').value
            };
            document.getElementById('authView').style.display = 'none';
            document.getElementById('dashboardView').style.display = 'block';
            showPage('home');
        }
        
        function logout() {
            currentUser = null;
            document.getElementById('authView').style.display = 'flex';
            document.getElementById('dashboardView').style.display = 'none';
        }
        
        function showPage(page) {
            const content = document.getElementById('mainContent');
            
            if (page === 'home') {
                content.innerHTML = `
                    <h1 style="margin-bottom: 10px;">Welcome, ${currentUser.email.split('@')[0]}!</h1>
                    <p style="color: #64748b; margin-bottom: 30px;">Role: ${currentUser.role}</p>
                    
                    <div class="stats-grid">
                        <div class="stat-card">
                            <h3>12</h3>
                            <p>Total Bookings</p>
                        </div>
                        <div class="stat-card">
                            <h3>5</h3>
                            <p>Upcoming</p>
                        </div>
                        <div class="stat-card">
                            <h3>$850</h3>
                            <p>Total Spent</p>
                        </div>
                        <div class="stat-card">
                            <h3>4.8</h3>
                            <p>Your Rating</p>
                        </div>
                    </div>
                    
                    <div class="card">
                        <h2>Recent Bookings</h2>
                        <table>
                            <tr><th>Provider</th><th>Service</th><th>Date</th><th>Status</th></tr>
                            <tr><td>Sarah Johnson</td><td>Massage</td><td>Today, 2PM</td><td><span class="status confirmed">Confirmed</span></td></tr>
                            <tr><td>Mike Chen</td><td>Training</td><td>Tomorrow, 10AM</td><td><span class="status pending">Pending</span></td></tr>
                        </table>
                    </div>
                `;
            } else if (page === 'providers') {
                content.innerHTML = `
                    <h1 style="margin-bottom: 20px;">Find Providers</h1>
                    <div class="providers-grid">
                        <div class="provider-card">
                            <div class="provider-header">
                                <div class="provider-avatar">👤</div>
                            </div>
                            <div class="provider-content">
                                <h3>Sarah Johnson</h3>
                                <p>Deep Tissue Massage Specialist</p>
                                <div class="price">$95/session</div>
                                <button class="btn-small" onclick="alert('Booking feature coming soon!')">Book Now</button>
                            </div>
                        </div>
                        <div class="provider-card">
                            <div class="provider-header">
                                <div class="provider-avatar">👤</div>
                            </div>
                            <div class="provider-content">
                                <h3>Mike Chen</h3>
                                <p>Personal Trainer</p>
                                <div class="price">$85/session</div>
                                <button class="btn-small" onclick="alert('Booking feature coming soon!')">Book Now</button>
                            </div>
                        </div>
                    </div>
                `;
            } else if (page === 'bookings') {
                content.innerHTML = `
                    <h1 style="margin-bottom: 20px;">My Bookings</h1>
                    <div class="card">
                        <table>
                            <tr><th>Provider</th><th>Service</th><th>Date</th><th>Price</th><th>Status</th></tr>
                            <tr><td>Sarah Johnson</td><td>Deep Tissue</td><td>Mar 9, 2PM</td><td>$95</td><td><span class="status confirmed">Confirmed</span></td></tr>
                            <tr><td>Mike Chen</td><td>Training</td><td>Mar 10, 10AM</td><td>$85</td><td><span class="status pending">Pending</span></td></tr>
                        </table>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
