<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WellnessPro - Booking Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--primary:#0d9488;--primary-dark:#0f766e;--secondary:#f97316;--success:#22c55e;--warning:#f59e0b;--danger:#ef4444;--dark:#0f172a;--light:#f8fafc;--gray:#64748b;--shadow:0 4px 6px rgba(0,0,0,0.1)}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,sans-serif}
        body{background:var(--light);color:var(--dark)}
        .hidden{display:none!important}
        .btn{padding:12px 24px;border:none;border-radius:10px;cursor:pointer;font-weight:600;transition:all .3s;display:inline-flex;align-items:center;gap:8px}
        .btn-primary{background:var(--primary);color:white;width:100%}.btn-primary:hover{background:var(--primary-dark)}
        .btn-sm{padding:8px 16px;font-size:14px}
        
        /* Auth */
        .auth-container{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f0fdfa,#ccfbf1);padding:20px}
        .auth-box{background:white;padding:40px;border-radius:20px;box-shadow:var(--shadow);width:100%;max-width:420px}
        .auth-box h1{color:var(--primary);text-align:center;margin-bottom:10px}
        .tabs{display:flex;gap:10px;margin-bottom:20px}
        .tab{flex:1;padding:12px;border:none;border-radius:10px;cursor:pointer;font-weight:600;background:#e2e8f0}
        .tab.active{background:var(--primary);color:white}
        .form-group{margin-bottom:20px}.form-group label{display:block;margin-bottom:5px;font-weight:600;font-size:14px}
        .form-group input,.form-group select{width:100%;padding:12px;border:2px solid #e2e8f0;border-radius:10px;font-size:16px}
        .form-group input:focus{outline:none;border-color:var(--primary)}
        
        /* Dashboard */
        .dashboard{display:none;min-height:100vh}
        .sidebar{width:260px;background:white;position:fixed;height:100vh;border-right:1px solid #e2e8f0;padding:20px;display:flex;flex-direction:column}
        .logo{font-size:24px;font-weight:800;color:var(--primary);margin-bottom:30px;display:flex;align-items:center;gap:10px}
        .nav-item{padding:12px 16px;border-radius:10px;cursor:pointer;margin-bottom:5px;color:var(--gray);display:flex;align-items:center;gap:10px;transition:all .3s}
        .nav-item:hover,.nav-item.active{background:#f0fdfa;color:var(--primary)}
        .nav-item i{width:20px;text-align:center}.badge{background:var(--danger);color:white;padding:2px 8px;border-radius:10px;font-size:12px;margin-left:auto}
        .main-content{margin-left:260px;padding:30px}
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px}
        .header h1{font-size:28px}.header-actions{display:flex;gap:15px;align-items:center}
        
        /* Cards */
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:30px}
        .stat-card{background:white;padding:24px;border-radius:16px;box-shadow:var(--shadow);text-align:center}
        .stat-card h3{font-size:32px;color:var(--primary);margin-bottom:5px}
        .stat-card p{color:var(--gray);font-size:14px}
        .card{background:white;border-radius:16px;padding:24px;margin-bottom:20px;box-shadow:var(--shadow)}
        .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
        
        /* Tables & Lists */
        table{width:100%;border-collapse:collapse}th,td{padding:12px;text-align:left;border-bottom:1px solid #e2e8f0}
        th{color:var(--gray);font-size:12px;text-transform:uppercase;font-weight:600}
        .status{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
        .status.confirmed{background:#dcfce7;color:#166534}.status.pending{background:#fef3c7;color:#92400e}
        
        /* Providers */
        .providers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
        .provider-card{background:white;border-radius:16px;overflow:hidden;box-shadow:var(--shadow)}
        .provider-cover{height:100px;background:linear-gradient(135deg,var(--primary),#14b8a6);position:relative}
        .provider-avatar{width:80px;height:80px;border-radius:50%;border:4px solid white;position:absolute;bottom:-40px;left:20px;background:white;display:flex;align-items:center;justify-content:center;font-size:32px}
        .provider-content{padding:50px 20px 20px}.provider-content h3{margin-bottom:5px}.provider-content p{color:var(--gray);font-size:14px;margin-bottom:15px}
        .price{font-size:24px;font-weight:700;color:var(--primary);margin-bottom:15px}
        
        /* Payment Modal */
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;justify-content:center;align-items:center;padding:20px}
        .modal.active{display:flex}.modal-content{background:white;border-radius:20px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;padding:30px}
        .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
        .payment-method{border:2px solid #e2e8f0;border-radius:12px;padding:15px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:15px}
        .payment-method.selected{border-color:var(--primary);background:#f0fdfa}
        .card-input{border:2px solid #e2e8f0;border-radius:10px;padding:12px;margin-bottom:15px;display:flex;align-items:center;gap:10px}
        .card-input input{border:none;outline:none;flex:1}
        
        /* Calendar */
        .calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;margin-top:20px}
        .calendar-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:10px;cursor:pointer;font-size:14px}
        .calendar-day:hover{background:var(--light)}.calendar-day.active{background:var(--primary);color:white}
        
        /* User Profile */
        .user-profile{display:flex;align-items:center;gap:12px;padding:12px;border-radius:12px;cursor:pointer;margin-top:auto}
        .avatar{width:40px;height:40px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;color:white;font-weight:600}
        
        /* Toast */
        .toast-container{position:fixed;top:20px;right:20px;z-index:2000}
        .toast{background:white;padding:16px 24px;border-radius:12px;box-shadow:var(--shadow);margin-bottom:10px;border-left:4px solid var(--success);animation:slideIn .3s}
        @keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
        
        /* Responsive */
        @media(max-width:768px){.sidebar{display:none}.main-content{margin-left:0}}
    </style>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>

    <!-- Auth -->
    <div class="auth-container" id="authView">
        <div class="auth-box">
            <h1><i class="fas fa-spa"></i> WellnessPro</h1>
            <p style="text-align:center;color:var(--gray);margin-bottom:30px">Professional booking platform</p>
            
            <div class="tabs">
                <button class="tab active" onclick="switchTab('login')">Sign In</button>
                <button class="tab" onclick="switchTab('register')">Register</button>
            </div>

            <form id="loginForm" onsubmit="login(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary">Sign In</button>
            </form>

            <form id="registerForm" class="hidden" onsubmit="register(event)">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="regName" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label>Account Type</label>
                    <select id="regRole" onchange="toggleProviderFields()">
                        <option value="client">Client</option>
                        <option value="provider">Provider</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <div class="form-group hidden" id="providerFields">
                    <label>Specialty</label>
                    <select>
                        <option>Massage Therapy</option>
                        <option>Personal Training</option>
                        <option>Yoga Instruction</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary">Create Account</button>
            </form>
        </div>
    </div>

    <!-- Dashboard -->
    <div class="dashboard" id="dashboardView">
        <div class="sidebar">
            <div class="logo"><i class="fas fa-spa"></i> WellnessPro</div>
            
            <div id="clientMenu">
                <div class="nav-item active" onclick="showPage('home')"><i class="fas fa-home"></i> Dashboard</div>
                <div class="nav-item" onclick="showPage('providers')"><i class="fas fa-search"></i> Find Providers</div>
                <div class="nav-item" onclick="showPage('bookings')"><i class="fas fa-calendar-check"></i> My Bookings <span class="badge">3</span></div>
                <div class="nav-item" onclick="showPage('favorites')"><i class="fas fa-heart"></i> Favorites</div>
            </div>

            <div id="providerMenu" class="hidden">
                <div class="nav-item" onclick="showPage('provider-dash')"><i class="fas fa-chart-line"></i> Overview</div>
                <div class="nav-item" onclick="showPage('schedule')"><i class="fas fa-calendar-alt"></i> Schedule</div>
                <div class="nav-item" onclick="showPage('clients')"><i class="fas fa-users"></i> Clients</div>
                <div class="nav-item" onclick="showPage('earnings')"><i class="fas fa-wallet"></i> Earnings</div>
            </div>

            <div id="adminMenu" class="hidden">
                <div class="nav-item" onclick="showPage('admin-dash')"><i class="fas fa-shield-alt"></i> Admin Panel</div>
                <div class="nav-item" onclick="showPage('users')"><i class="fas fa-users-cog"></i> Users</div>
                <div class="nav-item" onclick="showPage('verify')"><i class="fas fa-check-circle"></i> Verifications</div>
            </div>

            <div class="user-profile" onclick="logout()">
                <div class="avatar" id="userAvatar">JD</div>
                <div>
                    <div style="font-weight:600" id="userName">John</div>
                    <div style="font-size:12px;color:var(--gray)" id="userRole">Client</div>
                </div>
            </div>
        </div>

        <div class="main-content" id="mainContent"></div>
    </div>

    <!-- Payment Modal -->
    <div class="modal" id="paymentModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Complete Payment</h3>
                <button onclick="closeModal()" style="background:none;border:none;font-size:20px;cursor:pointer"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="payment-method selected" onclick="selectPay(this)">
                <i class="fas fa-credit-card" style="color:#2563eb;font-size:24px"></i>
                <div><div style="font-weight:600">Credit Card</div><div style="font-size:14px;color:var(--gray)">Visa, Mastercard, Amex</div></div>
            </div>
            <div class="payment-method" onclick="selectPay(this)">
                <i class="fab fa-paypal" style="color:#003087;font-size:24px"></i>
                <div><div style="font-weight:600">PayPal</div></div>
            </div>
            
            <div class="card-input">
                <i class="fas fa-credit-card" style="color:var(--gray)"></i>
                <input type="text" placeholder="Card number" id="cardNum">
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px">
                <div class="card-input"><input type="text" placeholder="MM/YY"></div>
                <div class="card-input"><input type="text" placeholder="CVC"></div>
            </div>
            
            <div style="background:#f8fafc;padding:15px;border-radius:12px;margin:20px 0">
                <div style="display:flex;justify-content:space-between;margin-bottom:10px"><span style="color:var(--gray)">Service</span><span style="font-weight:600" id="payService">Massage</span></div>
                <div style="display:flex;justify-content:space-between;font-size:18px;font-weight:700"><span>Total</span><span style="color:var(--primary)" id="payAmount">$95</span></div>
            </div>
            
            <button class="btn btn-primary" onclick="processPayment()"><i class="fas fa-lock"></i> Pay Securely</button>
        </div>
    </div>

    <script>
        // Data
        let user=null;
        const providers=[
            {id:1,name:"Sarah Johnson",type:"massage",specialty:"Deep Tissue Massage",rating:4.9,reviews:234,price:95,location:"Downtown"},
            {id:2,name:"Mike Chen",type:"training",specialty:"Personal Trainer",rating:4.8,reviews:189,price:85,location:"Midtown"},
            {id:3,name:"Emma Williams",type:"massage",specialty:"Swedish Massage",rating:5.0,reviews:312,price:110,location:"Westside"},
            {id:4,name:"David Park",type:"training",specialty:"Yoga Instructor",rating:4.9,reviews:156,price:75,location:"Eastside"}
        ];
        let currentProvider=null;

        // Auth
        function switchTab(tab){
            document.getElementById('loginForm').classList.toggle('hidden',tab!=='login');
            document.getElementById('registerForm').classList.toggle('hidden',tab!=='register');
            document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(tab==='login'&&i===0)||(tab==='register'&&i===1)));
        }
        
        function toggleProviderFields(){
            document.getElementById('providerFields').classList.toggle('hidden',document.getElementById('regRole').value!=='provider');
        }

        function login(e){
            e.preventDefault();
            const email=document.getElementById('loginEmail').value;
            user={name:email.split('@')[0],email,role:email.includes('admin')?'admin':email.includes('provider')?'provider':'client'};
            enterApp();
        }

        function register(e){
            e.preventDefault();
            user={name:document.getElementById('regName').value,email:document.getElementById('regEmail').value,role:document.getElementById('regRole').value};
            enterApp();
        }

        function enterApp(){
            document.getElementById('authView').style.display='none';
            document.getElementById('dashboardView').style.display='block';
            document.getElementById('userName').textContent=user.name;
            document.getElementById('userAvatar').textContent=user.name.substring(0,2).toUpperCase();
            document.getElementById('userRole').textContent=user.role;
            
            document.getElementById('clientMenu').classList.toggle('hidden',user.role!=='client');
            document.getElementById('providerMenu').classList.toggle('hidden',user.role!=='provider');
            document.getElementById('adminMenu').classList.toggle('hidden',user.role!=='admin');
            
            showPage(user.role==='admin'?'admin-dash':user.role==='provider'?'provider-dash':'home');
            showToast('Welcome '+user.name+'!','success');
        }

        function logout(){
            user=null;
            document.getElementById('authView').style.display='flex';
            document.getElementById('dashboardView').style.display='none';
        }

        // Navigation
        function showPage(page){
            const c=document.getElementById('mainContent');
            document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
            event?.target?.classList.add('active');
            
            switch(page){
                case 'home':
                    c.innerHTML=`<div class="header"><h1>Dashboard</h1></div>
                    <div class="stats-grid">
                        <div class="stat-card"><h3>12</h3><p>Bookings</p></div>
                        <div class="stat-card"><h3>5</h3><p>Favorites</p></div>
                        <div class="stat-card"><h3>$850</h3><p>Spent</p></div>
                        <div class="stat-card"><h3>4.8</h3><p>Rating</p></div>
                    </div>
                    <div class="card"><div class="card-header"><h3>Recent Bookings</h3></div>
                    <table><tr><th>Provider</th><th>Service</th><th>Date</th><th>Status</th></tr>
                    <tr><td>Sarah Johnson</td><td>Massage</td><td>Today, 2PM</td><td><span class="status confirmed">Confirmed</span></td></tr>
                    <tr><td>Mike Chen</td><td>Training</td><td>Tomorrow, 10AM</td><td><span class="status pending">Pending</span></td></tr></table></div>`;
                    break;
                    
                case 'providers':
                    c.innerHTML=`<div class="header"><h1>Find Providers</h1></div><div class="providers-grid">`+
                    providers.map(p=>`<div class="provider-card"><div class="provider-cover"><div class="provider-avatar">👤</div></div>
                    <div class="provider-content"><h3>${p.name}</h3><p>${p.specialty}</p><div class="price">$${p.price}<span>/session</span></div>
                    <button class="btn btn-primary btn-sm" onclick="book(${p.id})">Book Now</button></div></div>`).join('')+`</div>`;
                    break;
                    
                case 'bookings':
                    c.innerHTML=`<div class="header"><h1>My Bookings</h1></div>
                    <div class="card"><table><tr><th>Provider</th><th>Service</th><th>Date</th><th>Price</th><th>Status</th></tr>
                    <tr><td>Sarah Johnson</td><td>Deep Tissue</td><td>Mar 9, 2PM</td><td>$95</td><td><span class="status confirmed">Confirmed</span></td></tr>
                    <tr><td>Mike Chen</td><td>Training</td><td>Mar 10, 10AM</td><td>$85</td><td><span class="status pending">Pending</span></td></tr></table></div>`;
                    break;
                    
                case 'favorites':
                    c.innerHTML=`<div class="header"><h1>Favorites</h1></div>
                    <div class="providers-grid">
                        <div class="provider-card"><div class="provider-cover"><div class="provider-avatar">👤</div></div>
                        <div class="provider-content"><h3>Sarah Johnson</h3><p>Deep Tissue Massage</p><div class="price">$95</div>
                        <button class="btn btn-primary btn-sm">Book Now</button></div></div>
                    </div>`;
